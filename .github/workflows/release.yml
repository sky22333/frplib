name: 发布 AAR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布 tag，同时用于选择上游 frp 版本"
        required: true
        default: "v0.69.1"

jobs:
  build-aar:
    name: 构建 universal
    runs-on: ubuntu-latest

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

      - name: 安装 Android NDK
        run: |
          sdkmanager --channel=0 --install "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: 安装 gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: 更新到上游 frp 最新依赖
        run: |
          go get github.com/fatedier/frp@${{ inputs.tag }}
          go mod tidy

      - name: 运行测试
        run: go test ./...

      - name: 构建 AAR
        run: |
          mkdir -p dist
          gomobile bind \
            -androidapi=24 \
            -o dist/frplib-universal.aar \
            -ldflags="-s -w -buildid= -checklinkname=0" \
            -trimpath \
            -javapkg=io.github.sky22333 \
            github.com/sky22333/frplib

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frplib-universal
          path: dist/frplib-universal.aar

  release:
    name: 发布到 GitHub Releases
    runs-on: ubuntu-latest
    needs: build-aar
    permissions:
      contents: write
    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: dist/frplib-universal.aar
